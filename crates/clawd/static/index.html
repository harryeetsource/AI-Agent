<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Claw Offline</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">🦞 Claw Offline</div>
      <div class="status-card">
        <div class="status-row"><span>Daemon</span><span id="daemon-status">Checking…</span></div>
        <div class="status-row"><span>Runner</span><span id="runner-status">Unknown</span></div>
      </div>
      <button id="clear-chat" class="secondary">Clear chat</button>
      <p class="hint">Open <code>/health</code> to verify backend status. This UI talks directly to <code>/v1/messages</code>.</p>
    </aside>

    <main class="chat-shell">
      <header class="chat-header">
        <h1>Offline coding assistant</h1>
        <p>Multi-line input, readable code blocks, and one-click copy.</p>
      </header>

      <div id="activity" class="activity hidden" aria-live="polite">Thinking…</div>

      <section id="messages" class="messages"></section>

      <form id="composer" class="composer">
        <label for="prompt" class="sr-only">Message</label>
        <textarea id="prompt" rows="8" placeholder="Ask about Rust, assembly, debugging, refactors, or your local codebase…"></textarea>
        <div class="composer-actions">
          <div class="small-note">Ctrl+Enter to send · Shift+Enter for newline</div>
          <div class="buttons">
            <button type="button" id="insert-template" class="secondary">Insert code template</button>
            <button type="submit" id="send-button">Send</button>
          </div>
        </div>
      </form>
    </main>
  </div>

  <template id="message-template">
    <article class="message-card">
      <div class="message-meta">
        <span class="message-role"></span>
        <button class="copy-message secondary small">Copy</button>
      </div>
      <div class="message-body"></div>
    </article>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
